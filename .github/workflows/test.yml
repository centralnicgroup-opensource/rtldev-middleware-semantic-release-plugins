name: Dependabot auto-merge & tests

on:
  pull_request:
    types:
      - opened
      - synchronize
  workflow_call:

jobs:
  tests:
    name: Test package
    runs-on: ${{ vars.RTLDEV_MW_CI_OS || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup NodeJS ${{ vars.RTLDEV_MW_CI_NODE_VERSION || '24' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.RTLDEV_MW_CI_NODE_VERSION || '24' }}
          check-latest: true
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build package
        run: pnpm run build

      - name: Test package
        run: pnpm run test:coverage

      - name: Teams notification integration test
        env:
          TEAMS_TEST_NOTIFICATION_ENABLED: ${{ secrets.TEAMS_TEST_NOTIFICATION_URI != '' && 'true' || 'false' }}
          TEAMS_TEST_NOTIFICATION_URI: ${{ secrets.TEAMS_TEST_NOTIFICATION_URI }}
        run: pnpm run test:teams

      - name: Lint package
        run: pnpm run lint
