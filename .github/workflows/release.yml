name: Release

on:
  push:
    branches:
      - main

jobs:
  tests:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  release:
    name: Release package
    runs-on: ${{ vars.RTLDEV_MW_CI_OS || 'ubuntu-latest' }}
    needs: tests
    permissions:
      contents: write
      issues: write
      pull-requests: write
      deployments: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup NodeJS ${{ vars.RTLDEV_MW_CI_NODE_VERSION || '24' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.RTLDEV_MW_CI_NODE_VERSION || '24' }}
          check-latest: true
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.RTLDEV_MW_CI_TOKEN }}
          NPM_TOKEN: ${{ secrets.RTLDEV_MW_CI_NPM_TOKEN }}
          TEAMS_NOTIFICATION_URI: ${{ secrets.RTLDEV_MW_CI_NOTIFICATION_URI }}
          COMMIT_SHA: ${{ github.sha }}
        run: pnpm exec semantic-release
